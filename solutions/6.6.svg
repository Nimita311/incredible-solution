<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" id="v-2" width="526.0383911132812" height="57.286834716796875"><style type="text/css">.viewport { user-select: none; }
[magnet="true"]:not(.element) { cursor: crosshair; }
[magnet="true"]:not(.element):hover { opacity: 0.7; }
.element { cursor: move; }
.element * { vector-effect: non-scaling-stroke; }
.connection-wrap { fill: none; stroke: rgb(0, 0, 0); stroke-width: 15; stroke-linecap: round; stroke-linejoin: round; opacity: 0; cursor: move; }
.connection-wrap:hover { opacity: 0.4; stroke-opacity: 0.4; }
.connection { fill: none; stroke-linejoin: round; }
.marker-source, .marker-target { vector-effect: non-scaling-stroke; }
.marker-vertices { opacity: 0; cursor: move; }
.marker-arrowheads { opacity: 0; cursor: -webkit-grab; }
.link-tools { opacity: 0; cursor: pointer; }
.link-tools .tool-options { display: none; }
.link-tools .tool-remove circle { fill: red; }
.link-tools .tool-remove path { fill: rgb(255, 255, 255); }
.link:hover .marker-vertices, .link:hover .marker-arrowheads, .link:hover .link-tools { opacity: 1; }
.marker-vertex { fill: rgb(26, 188, 156); }
.marker-vertex:hover { fill: rgb(52, 73, 94); stroke: none; }
.marker-arrowhead { fill: rgb(26, 188, 156); }
.marker-arrowhead:hover { fill: rgb(243, 156, 18); stroke: none; }
.marker-vertex-remove { cursor: pointer; opacity: 0.1; fill: rgb(255, 255, 255); }
.marker-vertex-group:hover .marker-vertex-remove { opacity: 1; }
.marker-vertex-remove-area { opacity: 0.1; cursor: pointer; }
.marker-vertex-group:hover .marker-vertex-remove-area { opacity: 1; }
.highlighted { opacity: 0.7; }
text.highlighted { fill: red; }
@media screen and (-webkit-min-device-pixel-ratio: 0) {
  .highlighted { outline: red solid 2px; opacity: initial; }
}
.element .fobj { overflow: hidden; }
.element .fobj body { background-color: transparent; margin: 0px; }
.element .fobj div { text-align: center; vertical-align: middle; display: table-cell; padding: 0px 5px; }
svg { font-family: sans-serif; }
.connection { stroke: rgb(153, 153, 153); }
.connection.error { stroke: rgb(255, 0, 0); }
.connection-wrap { stroke-linecap: butt; transition: 0.5s linear 0.2s; }
.connection-wrap:hover { stroke: black; stroke-width: 9px; transition: all; }
.marker-arrowhead, .marker-vertex { fill: rgb(255, 255, 255); stroke: rgb(127, 140, 141); stroke-opacity: 0.4; stroke-width: 2px; }
.marker-arrowhead:hover, .marker-vertex:hover { fill: rgb(236, 240, 241); stroke: rgb(189, 195, 199); }
.marker-vertex-remove-area { fill: white; stroke: rgb(204, 204, 204); stroke-opacity: 0.5; }
.marker-vertex-remove-group:hover .marker-vertex-remove-area { transition: fill 1s; fill: rgb(231, 76, 60); stroke: rgb(192, 57, 43); }
.marker-vertex-remove { stroke: rgb(238, 238, 238); }
.marker-vertex-remove-group:hover .marker-vertex-remove { stroke: none; }
.live .connection { stroke: rgb(46, 204, 113); stroke-width: 3px; }
.live .connection-wrap { stroke: rgb(46, 204, 113); }
.element.live .body { fill: rgb(46, 204, 113); stroke: rgb(39, 174, 96); }
.element.live text { fill: rgb(255, 255, 255); }
.ui-draggable { cursor: move; }
.block .label { font-family: sans; font-size: 17px; fill: black; }
.block .resize-left { cursor: ew-resize; }
.block .resize-right { cursor: ew-resize; }
.block .number { fill: rgb(0, 0, 0); opacity: 0.5; font-size: 8px; }
.block .body { fill: rgb(236, 240, 241); }
.qed .block.conclusion .body { fill: rgb(40, 220, 30); }
.block:hover .body { fill: white; }
.qed .block.conclusion:hover .body { fill: rgb(170, 255, 170); }
.selected .block .body { stroke: blue; stroke-opacity: 1; }
.port-body[magnet="true"]:hover { fill: black; }
.tool-remove { opacity: 0; cursor: pointer; }
.link:hover .tool-remove { opacity: 1; }
.block:hover .tool-remove { opacity: 1; }
.tool-remove circle { fill: white; stroke: rgb(204, 204, 204); stroke-width: 1px; stroke-opacity: 0.5; }
.tool-remove:hover circle { fill: rgb(231, 76, 60); stroke: rgb(192, 57, 43); }
.tool-remove path { stroke: rgb(204, 204, 204); }
.tool-remove circle { transition: fill 1s; }
.tool-remove:hover path { stroke: none; }
.element * { vector-effect: none; }</style><g id="v-3" class="viewport" transform="translate(1.038404249999985,-340.21317661875) scale(1,1)"><g id="j_47" model-id="a4d27a8d-d411-4237-b5ab-51692b393c94" class="element incredible Generic joint-theme-default" magnet="false" fill="#ffffff" stroke="none" transform="translate(50,370)"><g class="block" id="v-3436"><path class="body" fill="#ecf0f1" stroke="#bdc3c7" stroke-opacity="0.5" id="v-3441" d="M-40 0 a 17.5 17.5 0 0 1 17.5 -17.5 h57.5 a 5 5 0 0 1 5 5 v25 a 5 5 0 0 1 -5 5 h-57.5 a 17.5 17.5 0 0 1 -17.5 -17.5 Z"></path><text class="number" id="v-3437" y="0.8em" display="null" xml:space="preserve" transform="translate(30.546875,7.5)"><tspan dy="0em" x="0" id="v-3438" class="v-line">1</tspan></text><text class="label center" id="v-3439" y="0.8em" display="null" xml:space="preserve" transform="translate(-16.984375,-10)"><tspan dy="0em" x="0" id="v-3440" class="v-line">∃x.A</tspan></text><g id="v-3442" class="port-wrap-out" transform="translate(40,0)"><path class="port-body" stroke="none" fill="#777" id="v-3443" magnet="true" port="out" direction="out" orientation="right" d="M-5,-5 l 0 5 a5,5 0 1,0 5,-5 z" transform="rotate(135)"></path></g></g></g><g id="j_46" model-id="c02c21b5-ce52-495b-b2ef-e74a051ef27d" class="element incredible Generic joint-theme-default qed" magnet="false" fill="#ffffff" stroke="none" transform="translate(470,370)"><g class="block conclusion" id="v-3428"><path class="body" fill="#ecf0f1" stroke="#bdc3c7" stroke-opacity="0.5" id="v-3433" d="M-40 0 v-12.5 a 5 5 0 0 1 5 -5 h62.5 a 17.5 17.5 0 0 1 17.5 17.5 a 17.5 17.5 0 0 1 -17.5 17.5 h-62.5 a 5 5 0 0 1 -5 -5 v-12.5 Z"></path><text class="number" id="v-3429" y="0.8em" display="null" xml:space="preserve" transform="translate(30.546875,7.5)"><tspan dy="0em" x="0" id="v-3430" class="v-line">2</tspan></text><text class="label center" id="v-3431" y="0.8em" display="null" xml:space="preserve" transform="translate(-6.140625,-10)"><tspan dy="0em" x="0" id="v-